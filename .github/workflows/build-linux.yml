name: Build Linux

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GTK4 and libadwaita build deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libevdev-dev

      - name: Build release binary
        working-directory: linux
        run: cargo build --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastrepeat-linux-x86_64
          path: linux/target/release/fastrepeat
          if-no-files-found: error

      # ── AppImage packaging ────────────────────────────────────────
      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p AppDir/usr/share/applications

          # Binary
          cp linux/target/release/fastrepeat AppDir/usr/bin/
          chmod +x AppDir/usr/bin/fastrepeat

          # AppRun wrapper (handles first-run input group setup)
          cp linux/appimage/AppRun AppDir/
          chmod +x AppDir/AppRun

          # Desktop entry (required by AppImage spec)
          cp linux/appimage/fastrepeat.desktop AppDir/
          cp linux/appimage/fastrepeat.desktop AppDir/usr/share/applications/

          # Icon (required by AppImage spec — must be at root as .svg or .png)
          cp linux/appimage/fastrepeat.svg AppDir/fastrepeat.svg
          cp linux/appimage/fastrepeat.svg AppDir/usr/share/icons/hicolor/scalable/apps/fastrepeat.svg

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir FastRepeat-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastRepeat-AppImage-x86_64
          path: FastRepeat-x86_64.AppImage
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/target/release/fastrepeat
            FastRepeat-x86_64.AppImage

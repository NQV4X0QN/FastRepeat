name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"        # triggers on version tags like v1.0.0
  workflow_dispatch:    # allows manual runs from the Actions tab

permissions:
  contents: write       # needed to create GitHub Releases
  id-token: write       # needed for SignPath trusted build verification

jobs:
  build:
    name: Build self-contained EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/FastRepeat/FastRepeat.csproj

      - name: Publish self-contained single-file EXE
        run: >
          dotnet publish src/FastRepeat/FastRepeat.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output ./dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastRepeat-win-x64
          path: dist/FastRepeat.exe
          if-no-files-found: error

  sign:
    name: Sign with SignPath
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && vars.SIGNPATH_ORGANIZATION_ID != ''

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: FastRepeat-win-x64
          path: ./artifacts

      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: "FastRepeat"
          signing-policy-slug: "release-signing"
          artifact-configuration-slug: "FastRepeat"
          github-artifact-id: FastRepeat-win-x64
          wait-for-completion: true
          output-artifact-directory: ./signed
          wait-for-completion-timeout-in-seconds: 600

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastRepeat-win-x64-signed
          path: ./signed/FastRepeat.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # Try signed artifact first, fall back to unsigned
      - name: Download signed artifact
        id: signed
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: FastRepeat-win-x64-signed
          path: ./release

      - name: Download unsigned artifact (fallback)
        if: steps.signed.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: FastRepeat-win-x64
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fast Repeat ${{ github.ref_name }}
          body: |
            ## Fast Repeat ${{ github.ref_name }}

            ### Download
            Download **FastRepeat.exe** below — no installation required, just run it.

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          files: release/FastRepeat.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

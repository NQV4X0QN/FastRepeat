name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"        # triggers on version tags like v1.0.0
  workflow_dispatch:    # allows manual runs from the Actions tab

permissions:
  contents: write       # needed to create GitHub Releases

jobs:
  build:
    name: Build self-contained EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/FastRepeat/FastRepeat.csproj

      - name: Publish self-contained single-file EXE
        run: >
          dotnet publish src/FastRepeat/FastRepeat.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output ./dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastRepeat-win-x64
          path: dist/FastRepeat.exe
          if-no-files-found: error

      # ── Create a GitHub Release when a version tag is pushed ────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Fast Repeat ${{ github.ref_name }}
          body: |
            ## Fast Repeat ${{ github.ref_name }}

            ### Download
            Download **FastRepeat.exe** below — no installation required, just run it.

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          files: dist/FastRepeat.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
